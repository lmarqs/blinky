[env]
_.file = ".env"
_.python.venv = { path = ".venv", create = true }

[tools]
python = "3.11"

[tasks."setup"]
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ ! -f ".env" ]; then
  cp .env.example .env
fi

pip install --quiet -r requirements.txt
"""

[tasks."hexdump"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

cd assets
find . -type f -not -name '*.h' | sed 's|^\./||' | while read -r f; do
  sym="$(echo "$f" | tr './-' '_')"
  {
    echo "const unsigned char ${sym}[] PROGMEM = {"
    hexdump -v -e '1/1 " 0x%02x,"' "$f" | fold -w 72
    echo ""
    echo "};"
    echo "const unsigned int ${sym}_len = $(wc -c < "$f");"
  } > "$f.h"
done
'''

# Tasks are namespaced by board: <action>:<board>. The ESP-01S is the primary
# board; the ESP32 DevKit flashes over its onboard USB-serial, so it skips the
# carrier/chip-removal dance the ESP-01S needs.
[tasks."build:esp01"]
depends = ["hexdump"]
run = "pio run -e esp01_1m"

[tasks."upload:esp01"]
depends = ["hexdump"]
run = "pio run -e esp01_1m -t upload"

[tasks."ota:esp01"]
depends = ["hexdump"]
run = "pio run -e esp01_1m_ota -t upload"

[tasks."build:esp32"]
depends = ["hexdump"]
run = "pio run -e esp32dev"

[tasks."upload:esp32"]
depends = ["hexdump"]
run = "pio run -e esp32dev -t upload"

[tasks."ota:esp32"]
depends = ["hexdump"]
run = "pio run -e esp32dev_ota -t upload"

[tasks."monitor"]
run = "pio device monitor"

[tasks."test"]
run = "pio test -e native"

[tasks."format"]
run = """
#!/usr/bin/env bash
set -euo pipefail

# Our C++ lives in src/, lib/, test/. assets/*.h is generated (see hexdump) — skip it.
find src lib test -type f \\( -name '*.cpp' -o -name '*.h' \\) -print0 |
  xargs -0 clang-format -i
"""

[tasks."format-check"]
run = """
#!/usr/bin/env bash
set -euo pipefail

find src lib test -type f \\( -name '*.cpp' -o -name '*.h' \\) -print0 |
  xargs -0 clang-format --dry-run --Werror
"""

[tasks."run"]
depends = [
  "build:esp01",
  "upload:esp01",
  "monitor",
]
