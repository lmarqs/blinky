; Blinky — ESP-01S relay lamp blinker.
; Secrets come from .env, loaded by mise and injected via ${sysenv.*} below.
; Always build through mise (`mise run build`) so the env vars are set.

[platformio]
default_envs = esp01_1m

; Shared by every embedded board (both chips run the same firmware).
[common]
framework = arduino
monitor_speed = 115200
; The whole flag is single-quoted so the value becomes a C string literal.
build_flags =
  -I assets
  '-D BLINKY_AP_SSID="${sysenv.BLINKY_AP_SSID}"'
  '-D BLINKY_AP_PASSWORD="${sysenv.BLINKY_AP_PASSWORD}"'
  '-D BLINKY_OTA_PASSWORD="${sysenv.BLINKY_OTA_PASSWORD}"'
; Unit tests are host-only; never collect them for the embedded board.
test_ignore = *

; --- ESP-01S (ESP8266) — the primary board ---
[esp_common]
extends = common
platform = espressif8266
board = esp01_1m

; Wired flashing via the CH340 adapter (chip out of the relay carrier).
[env:esp01_1m]
extends = esp_common
upload_protocol = esptool

; OTA flashing; requires being joined to the blinky AP.
[env:esp01_1m_ota]
extends = esp_common
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags =
  --auth=${sysenv.BLINKY_OTA_PASSWORD}

; --- ESP32 DevKit (WROOM-32) — secondary board ---
; The default esp32dev partition scheme has two app slots, so OTA works out of
; the box; do not switch to huge_app.csv (single app, no OTA slot).
[esp32_common]
extends = common
platform = espressif32
board = esp32dev

; Wired flashing over the DevKit's onboard USB-serial (no carrier removal).
[env:esp32dev]
extends = esp32_common
upload_protocol = esptool

; OTA flashing; requires being joined to the blinky AP.
[env:esp32dev_ota]
extends = esp32_common
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags =
  --auth=${sysenv.BLINKY_OTA_PASSWORD}

; Host unit tests (Unity). src/ is excluded; only lib/ + test/ compile.
[env:native]
platform = native
test_build_src = no
build_flags =
  -std=gnu++17
